<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Sổ Thu Chi PRO
</title>

<link
rel="stylesheet"
href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER -->

<div class="top">

<p class="month">
Tháng này
</p>

<h1 id="profitText">
0đ
</h1>

<p class="sub">
Tổng tài sản
</p>

</div>

<!-- BALANCE -->

<div class="balance-wrap">

<div class="balance-card">

<div>

<p>
💵 Tiền mặt
</p>

<h2 id="cashText">
0đ
</h2>

</div>

</div>

<div class="balance-card">

<div>

<p>
🏦 BIDV
</p>

<h2 id="bankText">
0đ
</h2>

</div>

</div>

</div>

<!-- QUICK ACTION -->

<div class="quick-actions">

<button onclick="openPopup('thu')">

💰 Thu

</button>

<button onclick="openPopup('chi')">

💸 Chi

</button>

<button onclick="startVoice()">

🎤 Giọng nói

</button>

</div>

<!-- AI -->

<div class="ai-box">

<div class="ai-top">

<h3>
🤖 AI Chat
</h3>

</div>

<input
id="aiInput"
type="text"
placeholder="Hỏi AI...">

<button onclick="askAI()">

Gửi AI

</button>

<div id="aiChatResult">

</div>

</div>

<div class="ai-box">

<div class="ai-top">

<h3>
🧠 AI Phân tích
</h3>

<button
class="mini-btn"
onclick="analyzeBusiness()">

Xem

</button>

</div>

<div id="analysisResult">

AI sẽ phân tích thu chi 😄

</div>

</div>

<!-- CHART -->

<div class="chart-box">

<canvas id="myChart">

</canvas>

</div>

<!-- HISTORY -->

<div class="history">

<div class="history-top">

<h3>
📋 Giao dịch
</h3>

</div>

<ul id="historyList">

</ul>

</div>

<!-- FLOAT BUTTON -->

<div
class="float-btn"
onclick="openPopup('thu')">

+

</div>

<!-- POPUP -->

<div id="popup">

<div class="popup-content">

<h2 id="popupTitle">
Thêm giao dịch
</h2>

<input
id="money"
type="number"
placeholder="Số tiền">

<input
id="note"
type="text"
placeholder="Ghi chú">

<button onclick="addTransaction()">

Lưu giao dịch

</button>

<button
class="close-btn"
onclick="closePopup()">

Đóng

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
