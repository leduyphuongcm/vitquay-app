<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AI Vịt Quay PRO
</title>

<link
rel="stylesheet"
href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="shop">

<img
src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">

<div>

<h2>
AI Vịt Quay
</h2>

<p>
Quản lý kinh doanh
</p>

</div>

</div>

<div class="header-icons">

<i class="fa-solid fa-qrcode"></i>

<i class="fa-regular fa-comment"></i>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="card green">

<i class="fa-solid fa-sack-dollar"></i>

<h3 id="incomeText">
0đ
</h3>

<p>
Tổng thu
</p>

</div>

<div class="card red">

<i class="fa-solid fa-money-bill"></i>

<h3 id="expenseText">
0đ
</h3>

<p>
Tổng chi
</p>

</div>

<div class="card blue">

<i class="fa-solid fa-chart-line"></i>

<h3 id="profitText">
0đ
</h3>

<p>
Lợi nhuận
</p>

</div>

</div>

<!-- MENU -->

<div class="menu-grid">

<div class="menu-item"
onclick="openBox()">

<i class="fa-solid fa-plus"></i>

<span>
Tạo đơn
</span>

</div>

<div class="menu-item">

<i class="fa-solid fa-box"></i>

<span>
Sản phẩm
</span>

</div>

<div class="menu-item">

<i class="fa-solid fa-chart-column"></i>

<span>
Báo cáo
</span>

</div>

<div class="menu-item"
onclick="analyzeBusiness()">

<i class="fa-solid fa-brain"></i>

<span>
AI Phân tích
</span>

</div>

<div class="menu-item">

<i class="fa-solid fa-users"></i>

<span>
Khách hàng
</span>

</div>

<div class="menu-item">

<i class="fa-solid fa-warehouse"></i>

<span>
Kho hàng
</span>

</div>

</div>

<!-- POPUP -->

<div id="popup">

<div class="popup-content">

<h2>
➕ Thêm giao dịch
</h2>

<select id="type">

<option value="thu">
💰 Thu
</option>

<option value="chi">
💸 Chi
</option>

</select>

<select id="category">

<option>
Bán vịt
</option>

<option>
Than
</option>

<option>
Ship
</option>

<option>
Nhân viên
</option>

<option>
Khác
</option>

</select>

<input
id="money"
type="number"
placeholder="Nhập số tiền">

<button onclick="addTransaction()">

➕ THÊM

</button>

<button onclick="startVoice()">

🎤 GIỌNG NÓI

</button>

<button
class="close-btn"
onclick="closeBox()">

Đóng

</button>

</div>

</div>

<!-- AI -->

<div class="ai-box">

<h2>
🧠 AI PHÂN TÍCH
</h2>

<div id="analysisResult">

AI sẽ phân tích kinh doanh 😄

</div>

</div>

<!-- BIỂU ĐỒ -->

<div class="chart-box">

<canvas id="myChart">

</canvas>

</div>

<!-- LỊCH SỬ -->

<div class="history-box">

<h2>
📋 Lịch sử
</h2>

<ul id="historyList">

</ul>

</div>

<!-- MENU DƯỚI -->

<div class="bottom-menu">

<div>

<i class="fa-solid fa-house"></i>

<p>
Quản lý
</p>

</div>

<div onclick="openBox()">

<i class="fa-solid fa-money-bill-transfer"></i>

<p>
Thu chi
</p>

</div>

<div onclick="analyzeBusiness()">

<i class="fa-solid fa-chart-line"></i>

<p>
Báo cáo
</p>

</div>

<div>

<i class="fa-solid fa-bars"></i>

<p>
Thêm
</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
